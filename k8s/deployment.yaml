apiVersion: apps/v1
kind: Deployment
metadata:
  name: violin-server
  labels:
    app: violin-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: violin-server
  template:
    metadata:
      labels:
        app: violin-server
    spec:
      containers:
      - name: violin-server
        image: violin-server:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
          name: http
        - containerPort: 8000
          name: api
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
